<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Websites — Abearica Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: #008080;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 13px;
  min-height: 100vh;
  padding: 20px;
}

/* ── WIN95 WINDOW SHELL ── */
.outer-window {
  background: #c0c0c0;
  border-top: 2px solid #fff;
  border-left: 2px solid #fff;
  border-right: 2px solid #404040;
  border-bottom: 2px solid #404040;
  max-width: 1200px;
  margin: 0 auto;
}

.title-bar {
  background: linear-gradient(to right, #00006a, #1a6ecf);
  color: #fff;
  padding: 3px 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  font-weight: bold;
  user-select: none;
}

.title-bar-left { display: flex; align-items: center; gap: 6px; }
.title-bar-icon { font-size: 14px; }

.title-bar-btns { display: flex; gap: 2px; }
.title-bar-btn {
  background: #c0c0c0;
  color: #000;
  font-size: 10px;
  width: 16px;
  height: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-top: 1px solid #fff;
  border-left: 1px solid #fff;
  border-right: 1px solid #404040;
  border-bottom: 1px solid #404040;
  cursor: pointer;
  font-weight: bold;
  text-decoration: none;
  color: #000;
}

/* ── MENU BAR ── */
.menu-bar {
  background: #c0c0c0;
  padding: 2px 6px;
  display: flex;
  align-items: center;
  gap: 2px;
  border-bottom: 1px solid #808080;
}

.menu-item {
  padding: 2px 8px;
  font-size: 12px;
  cursor: pointer;
  text-decoration: none;
  color: #000;
}
.menu-item:hover { background: #000080; color: #fff; }

/* ── ADDRESS BAR ── */
.address-bar {
  background: #c0c0c0;
  padding: 3px 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #808080;
}

.addr-label { font-size: 11px; font-weight: bold; }

.addr-input {
  flex: 1;
  background: #fff;
  border-top: 1px solid #404040;
  border-left: 1px solid #404040;
  border-right: 1px solid #fff;
  border-bottom: 1px solid #fff;
  padding: 1px 4px;
  font-size: 12px;
  font-family: Arial, sans-serif;
}

.addr-go {
  background: #c0c0c0;
  border-top: 1px solid #fff;
  border-left: 1px solid #fff;
  border-right: 1px solid #404040;
  border-bottom: 1px solid #404040;
  padding: 1px 8px;
  font-size: 11px;
  cursor: pointer;
}

/* ── TOOLBAR ── */
.toolbar {
  background: #c0c0c0;
  padding: 4px 8px;
  display: flex;
  gap: 6px;
  align-items: center;
  border-bottom: 1px solid #808080;
  flex-wrap: wrap;
}

.tb-btn {
  background: #c0c0c0;
  border-top: 1px solid #fff;
  border-left: 1px solid #fff;
  border-right: 1px solid #808080;
  border-bottom: 1px solid #808080;
  padding: 3px 12px;
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  color: #000;
  font-family: Arial, sans-serif;
}
.tb-btn:hover { background: #d4d0c8; }
.tb-btn.active {
  border-top: 1px solid #808080;
  border-left: 1px solid #808080;
  border-right: 1px solid #fff;
  border-bottom: 1px solid #fff;
  background: #b8b8b8;
}

.tb-sep {
  width: 1px;
  height: 20px;
  background: #808080;
  margin: 0 2px;
  box-shadow: 1px 0 0 #fff;
}

.tb-count {
  margin-left: auto;
  font-size: 11px;
  color: #444;
}

/* ── CONTENT AREA ── */
.content {
  background: #fff;
  border-top: 1px solid #808080;
  border-left: 1px solid #808080;
  min-height: 500px;
  padding: 16px;
}

/* ── SITE GRID ── */
.sites-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

/* ── SITE CARD ── */
.site-card {
  display: block;
  text-decoration: none;
  color: #000;
  border-top: 1px solid #fff;
  border-left: 1px solid #fff;
  border-right: 1px solid #404040;
  border-bottom: 1px solid #404040;
  background: #d4d0c8;
  transition: none;
  cursor: pointer;
}
.site-card:hover .card-title-bar {
  background: linear-gradient(to right, #000080, #1a6ecf);
}
.site-card:active {
  border-top: 1px solid #404040;
  border-left: 1px solid #404040;
  border-right: 1px solid #fff;
  border-bottom: 1px solid #fff;
}

.card-title-bar {
  background: linear-gradient(to right, #808080, #a0a0a0);
  color: #fff;
  padding: 2px 5px;
  font-size: 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.15s;
}

.card-img-wrap {
  height: 160px;
  background: #e8e8e8;
  border-top: 1px solid #808080;
  border-bottom: 1px solid #808080;
  overflow: hidden;
  position: relative;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}
.card-img-fallback {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #d4d0c8;
  font-size: 12px;
  color: #808080;
  font-family: Arial, sans-serif;
}

.card-body {
  padding: 8px 10px;
}
.card-name {
  font-size: 12px;
  font-weight: bold;
  color: #000080;
  margin-bottom: 3px;
}
.card-domain {
  font-size: 10px;
  color: #000080;
  text-decoration: underline;
  margin-bottom: 5px;
  display: block;
}
.card-desc {
  font-size: 11px;
  color: #333;
  line-height: 1.4;
  margin-bottom: 7px;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
.tag {
  font-size: 9px;
  background: #c0c0c0;
  border-top: 1px solid #fff;
  border-left: 1px solid #fff;
  border-right: 1px solid #808080;
  border-bottom: 1px solid #808080;
  padding: 1px 5px;
  color: #000;
}

/* ── STATUS BAR ── */
.status-bar {
  background: #c0c0c0;
  border-top: 1px solid #808080;
  padding: 2px 6px;
  display: flex;
  gap: 8px;
  font-size: 11px;
}
.status-seg {
  background: #c0c0c0;
  border-top: 1px solid #808080;
  border-left: 1px solid #808080;
  border-right: 1px solid #fff;
  border-bottom: 1px solid #fff;
  padding: 1px 8px;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  body { padding: 8px; }
  .sites-grid { grid-template-columns: 1fr; }
  .toolbar { gap: 4px; }
}
</style>
</head>
<body>

<div class="outer-window">
  <!-- Title Bar -->
  <div class="title-bar">
    <div class="title-bar-left">
      <span class="title-bar-icon">🌐</span>
      Our Websites — Abearica Online
    </div>
    <div class="title-bar-btns">
      <span class="title-bar-btn">_</span>
      <span class="title-bar-btn">□</span>
      <a href="/" class="title-bar-btn">✕</a>
    </div>
  </div>

  <!-- Menu Bar -->
  <div class="menu-bar">
    <span class="menu-item">File</span>
    <span class="menu-item">Edit</span>
    <span class="menu-item">View</span>
    <span class="menu-item">Favorites</span>
    <span class="menu-item">Help</span>
  </div>

  <!-- Address Bar -->
  <div class="address-bar">
    <span class="addr-label">Address</span>
    <div class="addr-input">https://abearicaonline.com/portfolio</div>
    <button class="addr-go">Go</button>
  </div>

  <!-- Filter Toolbar -->
  <div class="toolbar">
    <button class="tb-btn active" onclick="filterSites('all',this)">All Sites</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="filterSites('business',this)">Business &amp; AI</button>
    <button class="tb-btn" onclick="filterSites('culture',this)">Culture &amp; Community</button>
    <button class="tb-btn" onclick="filterSites('sports',this)">Sports</button>
    <div class="tb-sep"></div>
    <span class="tb-count" id="count-label">22 sites</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="sites-grid" id="sites-grid"></div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-seg" id="status-seg">22 object(s)</div>
    <div class="status-seg">Built &amp; maintained by Abearica + AI</div>
    <div class="status-seg">48hr delivery · hello@abearicaonline.com</div>
  </div>
</div>

<script>
const OG_IMAGES = {
  'thevoiceofcash.com':        'https://thevoiceofcash.com/og-image.png',
  'aiskillsagents.com':        'https://aiskillsagents.com/og-image.png',
  'aiskillsgenerator.com':     'https://aiskillsgenerator.com/og-image.png',
  'anthropicaiskills.com':     'https://anthropicaiskills.com/og-image.png',
  'claudeaiskills.com':        'https://claudeaiskills.com/og-image.png',
  'shadyscanner.com':          'https://shadyscanner.com/og-image.png',
  'jewsa.com':                 'https://jewsa.com/og-image.png',
  'webearish.com':             'https://webearish.com/og-webearish.png',
  'hindusa.com':               'https://www.hindusa.com/og-image.png',
  'autismacceptance.world':    'https://autismacceptance.world/bears/bears-together.jpg',
  'u-god.com':                 'https://u-god.com/og-image.png',
  'thelvathletics.com':        'https://thelvathletics.com/og-image.png',
  'lvathleticsnation.com':     'https://lvathleticsnation.com/og-image.png',
  'mmamoms.com':               'https://mmamoms.com/og-image.png',
  'spaghettiburritos.com':     'https://spaghettiburritos.com/og-image.png',
};

const SITES = [
  { domain:'thevoiceofcash.com', name:'The Voice of Cash', desc:'AI marketing agency hub. Full-service campaigns, consulting, and digital strategy.', tags:['Agency','Marketing','AI'], category:'business' },
  { domain:'aiskillsagents.com', name:'AI Skills & Agents', desc:'The resource hub for AI automation tools, skills, and agent infrastructure.', tags:['AI','Automation'], category:'business' },
  { domain:'aiskillsagent.com', name:'AI Skills Agent', desc:'AI agent skills directory and tools.', tags:['AI','Agents'], category:'business' },
  { domain:'aiskillsgenerator.com', name:'AI Skills Generator', desc:'Generate AI agent skills and workflows on demand.', tags:['AI','Tools'], category:'business' },
  { domain:'anthropicaiskills.com', name:'Anthropic AI Skills', desc:'Claude-powered skills and capabilities showcase.', tags:['AI','Claude'], category:'business' },
  { domain:'claudeaiskills.com', name:'Claude AI Skills', desc:'Skills and tools built on Claude AI.', tags:['AI','Claude'], category:'business' },
  { domain:'shadyscanner.com', name:'Shady Scanner', desc:'AI-powered background check and research tool.', tags:['SaaS','AI'], category:'business' },
  { domain:'searchperformancemarketing.com', name:'Search Performance Marketing', desc:'SEO and paid search performance agency.', tags:['SEO','Marketing'], category:'business' },
  { domain:'abearicaonline.com', name:'Abearica Online', desc:"Personal brand and portfolio. You're looking at it.", tags:['Portfolio','Personal Brand'], category:'business' },
  { domain:'jewsa.com', name:'JewSA', desc:'Jewish American culture, pride, and community.', tags:['Culture','Community'], category:'culture' },
  { domain:'webearish.com', name:'WeBearish', desc:'Neurodiversity community and NFT project.', tags:['Neurodiversity','Community'], category:'culture' },
  { domain:'hindusa.com', name:'HindUSA', desc:'Hindu American culture and community platform.', tags:['Culture','Community'], category:'culture' },
  { domain:'autismacceptance.world', name:'Autism Acceptance World', desc:'Autism acceptance, awareness, and community advocacy.', tags:['Neurodiversity','Advocacy'], category:'culture' },
  { domain:'redwhitejesus.com', name:'Red White Jesus', desc:'Faith, culture, and American identity.', tags:['Culture','Faith'], category:'culture' },
  { domain:'allahican.com', name:'Allah I Can', desc:'Islamic American culture and community.', tags:['Culture','Faith'], category:'culture' },
  { domain:'u-god.com', name:'U-God', desc:'Wisdom, knowledge, and resources. Curated content.', tags:['Knowledge','Resources'], category:'culture' },
  { domain:'thelvas.com', name:'The LVAs', desc:'Las Vegas Athletics fan hub.', tags:['Baseball','Las Vegas'], category:'sports' },
  { domain:'thelvathletics.com', name:'The LV Athletics', desc:'Deep coverage, stats, and news for LV Athletics fans.', tags:['Baseball','News'], category:'sports' },
  { domain:'lvathleticsnation.com', name:'LV Athletics Nation', desc:'The fan community. Game recaps and opinion.', tags:['Baseball','Community'], category:'sports' },
  { domain:'mmadads.com', name:'MMA Dads', desc:'Where MMA fans who are also dads find their community.', tags:['MMA','Community'], category:'sports' },
  { domain:'mmamoms.com', name:'MMA Moms', desc:'Women in MMA — fans, fighters, and moms.', tags:['MMA','Community'], category:'sports' },
  { domain:'spaghettiburritos.com', name:'Spaghetti Burritos', desc:'Chaos, sports, crypto, and culture.', tags:['Entertainment','Sports'], category:'sports' },
];

function renderSites(filter) {
  const filtered = filter === 'all' ? SITES : SITES.filter(s => s.category === filter);
  document.getElementById('count-label').textContent = filtered.length + ' sites';
  document.getElementById('status-seg').textContent = filtered.length + ' object(s)';

  document.getElementById('sites-grid').innerHTML = filtered.map(site => {
    const img = OG_IMAGES[site.domain];
    return `
    <a href="https://${site.domain}" target="_blank" rel="noopener" class="site-card">
      <div class="card-title-bar">
        <span>${site.domain}</span>
        <span>□</span>
      </div>
      <div class="card-img-wrap">
        ${img
          ? `<img src="${img}" alt="${site.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
          : ''}
        <div class="card-img-fallback" style="${img ? 'display:none' : ''}">
          ${site.domain}
        </div>
      </div>
      <div class="card-body">
        <div class="card-name">${site.name}</div>
        <span class="card-domain">${site.domain}</span>
        <div class="card-desc">${site.desc}</div>
        <div class="card-tags">${site.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </a>`;
  }).join('');
}

function filterSites(cat, btn) {
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSites(cat);
}

renderSites('all');
</script>
</body>
</html>
